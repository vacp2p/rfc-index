name: markdown-linting

on:

  pull_request:
    branches:
      - '**'

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Validate Metadata And Markdown Lint
        shell: bash
        run: |
          set -euo pipefail

          BASE="${{ github.event.pull_request.base.sha }}"
          HEAD="${{ github.event.pull_request.head.sha }}"

          python3 scripts/lint_targets.py --base-sha "$BASE" --head-sha "$HEAD" --output .lint-targets.txt

          if [ ! -s .lint-targets.txt ]; then
            echo "No non-raw markdown targets."
            exit 0
          fi

          mapfile -t files < .lint-targets.txt

          python3 scripts/validate_metadata.py --check
          npx markdownlint-cli2@0.12.1 --config .markdownlint.yaml "${files[@]}"

  remark:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Remark Linter
        shell: bash
        run: |
          set -euo pipefail

          BASE="${{ github.event.pull_request.base.sha }}"
          HEAD="${{ github.event.pull_request.head.sha }}"

          python3 scripts/lint_targets.py --base-sha "$BASE" --head-sha "$HEAD" --output .lint-targets.txt

          if [ ! -s .lint-targets.txt ]; then
            echo "No non-raw markdown targets."
            exit 0
          fi

          mapfile -t files < .lint-targets.txt
          npx remark --frail --rc-path .remarkrc.mjs "${files[@]}"
